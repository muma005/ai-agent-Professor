# mypy configuration for Professor project
# Strict type checking for production code

[mypy]
# Python version
python_version = 3.11

# Type checking mode
strict = True

# Show error codes
show_error_codes = True

# Show column numbers
show_column_numbers = True

# Show error context
show_error_context = True

# Pretty print errors
pretty = True

# Warn about unused ignores
warn_unused_ignores = True

# Warn about unreachable code
warn_unreachable = True

# Disallow untyped definitions
disallow_untyped_defs = True

# Disallow incomplete definitions
disallow_incomplete_defs = True

# Check untyped function bodies
check_untyped_defs = True

# Disallow untyped decorators
disallow_untyped_decorators = True

# Disallow subtyping
disallow_subclassing_any = False

# Allow optional return values
allow_redefinition = True

# Ignore missing imports for third-party libraries
ignore_missing_imports = True

# Follow imports
follow_imports = normal

# Strict optional
strict_optional = True

# Warn about returning any
warn_return_any = False

# No implicit optional
no_implicit_optional = True

# Warn about unused configs
warn_unused_configs = True

# Exclude test files (more lenient there)
exclude = ^tests/

# ── Module-specific overrides ─────────────────────────────────────

[mypy-agents.*]
# Agents can have more flexible typing
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-tools.*]
# Tools should be strictly typed
disallow_untyped_defs = True

[mypy-core.*]
# Core should be strictly typed
disallow_untyped_defs = True

[mypy-guards.*]
# Guards should be strictly typed
disallow_untyped_defs = True

[mypy-tests.*]
# Tests can be more flexible
disallow_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False

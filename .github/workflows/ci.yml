name: Professor CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Set up pristine isolated Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pre-commit pytest pytest-cov

    - name: Run Code QA (Pre-commit)
      run: |
        pre-commit run --all-files

    # Fast safety tests (mocking LLM / ML training to save time)
    - name: Run Test Suite
      run: |
        pytest tests/ -m "not integration and not slow" --cov=agents --cov=core
